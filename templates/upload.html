<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - The Heaven Rock</title>
    <style>
        :root {
            --primary-color: #1b3d2f;
            --accent-color: #c5a880;
            --white: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f4f6f4;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
        }
        h2 { color: var(--primary-color); margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #12281e; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: var(--accent-color); text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Upload New Photo</h2>
        <!-- enctype is mandatory for uploading actual image files -->
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">Photo Title</label>
                <input type="text" id="title" name="title" placeholder="e.g., Luxury Bedroom" required>
            </div>
            <div class="form-group">
                <label for="alt_text">Description (Alt Text)</label>
                <input type="text" id="alt_text" name="alt_text" placeholder="e.g., Spacious room with warm lighting" required>
            </div>
            <div class="form-group">
                <label for="photo">Select Image File</label>
                <input type="file" id="photo" name="photo" accept="image/*" required>
            </div>
            <button type="submit">Upload to Gallery</button>
        </form>
        <a href="/" class="back-link">← Back to Gallery View</a>
    </div>

</body>
</html>
